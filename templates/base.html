<!DOCTYPE html>
<html lang="nl" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KEMS Thuisaccu Advisor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-battery-charging"></i> KEMS Thuisaccu Advisor
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Nieuwe intake</a>
            </div>
        </div>
    </nav>

    <main class="{% block main_class %}container{% endblock %} py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-top mt-auto py-3 text-center text-body-secondary small">
        <div class="container">
            KEMS Thuisaccu Advisor &mdash; Indicatieve berekeningen, geen financieel advies.
        </div>
    </footer>

    <!-- Floating feedback chat widget -->
    <div id="fb-widget" style="position:fixed;bottom:20px;right:20px;z-index:9999;font-family:system-ui,sans-serif;">
        <button id="fb-toggle" style="width:56px;height:56px;border-radius:50%;background:#0d6efd;color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;">
            <i class="bi bi-chat-dots-fill"></i>
        </button>
        <div id="fb-panel" style="display:none;position:absolute;bottom:66px;right:0;width:340px;max-height:480px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.2);overflow:hidden;flex-direction:column;">
            <div style="background:#0d6efd;color:#fff;padding:12px 16px;font-weight:600;display:flex;justify-content:space-between;align-items:center;">
                <span><i class="bi bi-chat-dots"></i> Feedback</span>
                <button id="fb-close" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;">&times;</button>
            </div>
            <div id="fb-messages" style="flex:1;overflow-y:auto;padding:12px;min-height:200px;max-height:320px;display:flex;flex-direction:column;gap:8px;">
                <div style="color:#6c757d;font-size:13px;text-align:center;padding:20px 0;">Nog geen berichten. Typ je feedback hieronder!</div>
            </div>
            <div style="border-top:1px solid #dee2e6;padding:10px 12px;display:flex;gap:8px;">
                <input id="fb-author" type="text" placeholder="Je naam" style="width:80px;padding:6px 8px;border:1px solid #dee2e6;border-radius:6px;font-size:13px;">
                <input id="fb-input" type="text" placeholder="Typ feedback..." style="flex:1;padding:6px 10px;border:1px solid #dee2e6;border-radius:6px;font-size:13px;">
                <button id="fb-send" style="background:#0d6efd;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;">Stuur</button>
            </div>
        </div>
    </div>
    <script>
    (function(){
        const toggle = document.getElementById('fb-toggle');
        const panel = document.getElementById('fb-panel');
        const close = document.getElementById('fb-close');
        const msgs = document.getElementById('fb-messages');
        const input = document.getElementById('fb-input');
        const author = document.getElementById('fb-author');
        const send = document.getElementById('fb-send');
        let lastId = 0;
        let opened = false;

        toggle.addEventListener('click', () => {
            opened = !opened;
            panel.style.display = opened ? 'flex' : 'none';
            if (opened) input.focus();
        });
        close.addEventListener('click', () => {
            opened = false;
            panel.style.display = 'none';
        });

        function addMsg(m) {
            const first = msgs.querySelector('[style*="text-align:center"]');
            if (first) first.remove();
            const div = document.createElement('div');
            const isDev = m.author === 'Ontwikkelaar';
            div.style.cssText = `padding:8px 10px;border-radius:8px;font-size:13px;max-width:85%;${isDev ? 'background:#e7f1ff;align-self:flex-start;' : 'background:#f0f0f0;align-self:flex-end;'}`;
            const time = new Date(m.timestamp).toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit'});
            div.innerHTML = `<div style="font-weight:600;font-size:11px;color:${isDev?'#0d6efd':'#495057'};margin-bottom:2px;">${m.author} · ${time}</div>${m.text}`;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function poll() {
            fetch('/api/feedback?since_id=' + lastId)
                .then(r => r.json())
                .then(data => {
                    data.messages.forEach(m => {
                        addMsg(m);
                        lastId = m.id;
                    });
                })
                .catch(() => {});
        }

        function sendMsg() {
            const text = input.value.trim();
            if (!text) return;
            fetch('/api/feedback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    text: text,
                    author: author.value.trim() || 'Gebruiker',
                    page: location.pathname
                })
            }).then(r => r.json()).then(m => {
                input.value = '';
                addMsg(m);
                lastId = m.id;
            }).catch(() => {});
        }

        send.addEventListener('click', sendMsg);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

        const saved = localStorage.getItem('fb-author');
        if (saved) author.value = saved;
        author.addEventListener('change', () => localStorage.setItem('fb-author', author.value));

        setInterval(poll, 3000);
        poll();
    })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
